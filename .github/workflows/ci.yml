name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.compiler }} / sanitizer=${{ matrix.sanitizer }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [g++, clang++]
        sanitizer: [OFF, thread, address]
    env:
      # Sanitizer builds run the stress suite 5-20x slower; scale it down.
      RINGBUFFER_STRESS_ITEMS: ${{ matrix.sanitizer == 'OFF' && '1000000' || '100000' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}
          -DRINGBUFFER_SANITIZER=${{ matrix.sanitizer }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure
